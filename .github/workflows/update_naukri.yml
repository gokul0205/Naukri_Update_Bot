name: Daily Naukri Profile Updater

on:
  schedule:
    - cron: "30 3 * * *"
  workflow_dispatch: {}

jobs:
  update-profile:
    runs-on: [self-hosted, linux, ARM64, android]
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Restore Session State
        id: session-cache
        uses: actions/cache@v4
        with:
          path: naukri_session.json
          key: naukri-session-${{ github.run_id }}
          restore-keys: |
            naukri-session-

      - name: Cache Playwright Browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-chromium

      - name: Install dependencies
        run: ~/pwenv/bin/python -m pip install -r requirements.txt

      - name: Install Chromium if needed
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: ~/pwenv/bin/python -m playwright install chromium

      - name: Random Sleep (Cron Offset)
        if: github.event_name == 'schedule'
        run: DELAY=$((RANDOM % 1800)) && echo "Sleeping for $DELAY seconds to randomize start time..." && sleep $DELAY

      - name: Run Naukri updater
        env:
          NAUKRI_EMAIL: ${{ secrets.NAUKRI_EMAIL }}
          NAUKRI_PASSWORD: ${{ secrets.NAUKRI_PASSWORD }}
          RUN_TIMESTAMP: ${{ github.run_number }}_${{ github.run_attempt }}
          PROXY_SERVER: ${{ secrets.PROXY_SERVER }}
          PROXY_USERNAME: ${{ secrets.PROXY_USERNAME }}
          PROXY_PASSWORD: ${{ secrets.PROXY_PASSWORD }}
        run: ~/pwenv/bin/python update_naukri.py

      - name: Save Session State
        if: always()
        uses: actions/cache/save@v4
        with:
          path: naukri_session.json
          key: naukri-session-${{ github.run_id }}

      - name: Commit log
        if: always()
        run: git config --global user.name "github-actions[bot]" && git config --global user.email "github-actions[bot]@users.noreply.github.com" && git add update.log || true && git diff --cached --quiet || git commit -m "🤖 Naukri update log $(date +'%Y-%m-%d')" && git push || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: run-${{ github.run_number }}-attempt-${{ github.run_attempt }}-screenshots
          path: "*.png"
          retention-days: 14
          if-no-files-found: ignore
